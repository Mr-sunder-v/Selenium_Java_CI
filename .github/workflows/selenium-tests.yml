name: Selenium Java CI Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  selenium-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Verify Java and Maven versions
        run: |
          java -version
          mvn -version

      - name: Run Selenium TestNG tests
        run: |
          mvn clean test \
          -Dheadless=true \
          -DbaseUrl=https://incredible-phoenix-751bd5.netlify.app/

      - name: Upload TestNG Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            target/surefire-reports
            test-output

```
